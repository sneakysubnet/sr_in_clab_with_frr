frr version 10.5.4_git
frr defaults traditional
hostname frr4
!
interface eth1
 ip address 10.46.46.6/24
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.56.56.6/24
 ip ospf network point-to-point
exit
!
interface lo
 ip address 6.6.6.6/32
exit
!
router ospf
 ospf router-id 6.6.6.6
 network 6.6.6.6/32 area 0
 network 10.46.46.0/24 area 0
 network 10.56.56.0/24 area 0
 capability opaque
 segment-routing on
 segment-routing global-block 16000 19999 local-block 6000 6999
 segment-routing node-msd 8
 segment-routing prefix 6.6.6.6/32 index 6
 router-info area
exit
!
end
