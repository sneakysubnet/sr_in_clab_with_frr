frr version 10.5.4_git
frr defaults traditional
hostname frr4
!
interface eth1
 ip address 10.56.56.5/24
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.45.45.5/24
 ip ospf network point-to-point
exit
!
interface eth3
 ip address 10.35.35.5/24
 ip ospf network point-to-point
exit
!
interface lo
 ip address 5.5.5.5/32
exit
!
router ospf
 ospf router-id 5.5.5.5
 network 5.5.5.5/32 area 0
 network 10.35.35.0/24 area 0
 network 10.56.56.0/24 area 0
 network 10.45.45.0/24 area 0
 capability opaque
 segment-routing on
 segment-routing global-block 16000 19999 local-block 5000 5999
 segment-routing node-msd 8
 segment-routing prefix 5.5.5.5/32 index 5
 router-info area
exit
!
end
