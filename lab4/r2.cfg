frr version 10.5.4_git
frr defaults traditional
hostname frr2
!
interface eth1
 ip address 10.12.12.2/24
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.23.23.2/24
 ip ospf network point-to-point
exit
!
interface eth3
 ip address 10.24.24.2/24
 ip ospf network point-to-point
exit
!
interface lo
 ip address 2.2.2.2/32
exit
!
router ospf
 ospf router-id 2.2.2.2
 network 2.2.2.2/32 area 0
 network 10.12.12.0/24 area 0
 network 10.23.23.0/24 area 0
 network 10.24.24.0/24 area 0
 capability opaque
 segment-routing on
 segment-routing global-block 16000 19999 local-block 2000 2999
 segment-routing node-msd 8
 segment-routing prefix 2.2.2.2/32 index 2
 router-info area
exit
!
