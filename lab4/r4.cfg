frr version 10.5.4_git
frr defaults traditional
hostname frr4
!
interface eth1
 ip address 10.46.46.4/24
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.45.45.4/24
 ip ospf network point-to-point
exit
!
interface eth3
 ip address 10.24.24.4/24
 ip ospf network point-to-point
exit
!
interface lo
 ip address 4.4.4.4/32
exit
!
router ospf
 ospf router-id 4.4.4.4
 network 4.4.4.4/32 area 0
 network 10.24.24.0/24 area 0
 network 10.46.46.0/24 area 0
 network 10.45.45.0/24 area 0
 capability opaque
 segment-routing on
 segment-routing global-block 16000 19999 local-block 4000 4999
 segment-routing node-msd 8
 segment-routing prefix 4.4.4.4/32 index 4
 router-info area
exit
!
end
