frr version 10.5.4_git
frr defaults traditional
hostname frr4
!
interface eth1
 ipv6 address fc00:10:56:56::5/64
 ipv6 router isis 1
 isis network point-to-point
exit
!
interface eth2
 ipv6 address fc00:10:45:45::5/64
 ipv6 router isis 1
 isis network point-to-point
exit
!
interface eth3
 ipv6 address fc00:10:35:35::5/64
 ipv6 router isis 1
 isis network point-to-point
exit
!
interface lo
 ipv6 address fc00:5::1/128
 ipv6 router isis 1
 isis network point-to-point
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0005.00
 segment-routing srv6
  locator MAIN
 exit
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fc00:5::/64
   exit
   !
  exit
  !
 exit
 !
 traffic-eng
 exit
exit
