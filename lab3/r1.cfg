frr version 10.5.4_git
frr defaults traditional
hostname frr1
!
interface eth1
 ip address 10.12.12.1/24
 ip ospf network point-to-point
exit
!
interface eth2
 ip address 10.13.13.1/24
 ip ospf network point-to-point
 ip ospf cost 1000
exit
!
interface lo
 ip address 1.1.1.1/32
exit
!
router ospf
 ospf router-id 1.1.1.1
 network 1.1.1.1/32 area 0
 network 10.12.12.0/24 area 0
 network 10.13.13.0/24 area 0
 capability opaque
 segment-routing on
 segment-routing global-block 16000 19999 local-block 1000 1999
 segment-routing node-msd 8
 segment-routing prefix 1.1.1.1/32 index 1
 router-info area
exit
!
end
