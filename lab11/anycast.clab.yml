name: anycast

topology:
  defaults:
    kind: linux
    image: quay.io/frrouting/frr:10.5.4

  nodes:
    frr1:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/r1.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: &common-exec
        - sysctl -w net.mpls.conf.lo.input=1
        - sysctl -w net.mpls.conf.eth0.input=1
        - sysctl -w net.mpls.conf.eth1.input=1
        - sysctl -w net.mpls.conf.eth2.input=1
        - sysctl -w net.mpls.conf.eth3.input=1
        - sysctl -w net.mpls.platform_labels=1048575
    frr2: 
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/r2.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec
    frr3: 
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/r3.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec
    frr4:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/r4.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec
    frr5:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/r5.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec
    frr6:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/r6.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec

    host1:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/h1.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec
    host2:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/h2.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec
    host3:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/h3.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec
    host4:
      binds:
        - /root/anycast/daemons:/etc/frr/daemons
        - /root/anycast/h4.cfg:/etc/frr/frr.conf
        - /root/anycast/capture:/tmp/
      exec: *common-exec



  links:
    - endpoints: ["frr1:eth1", "frr3:eth1"]
    - endpoints: ["frr1:eth2", "host1:eth1"]

    - endpoints: ["frr2:eth1", "frr4:eth1"]
    - endpoints: ["frr2:eth2", "host2:eth1"]

    - endpoints: ["frr3:eth2", "frr5:eth2"]

    - endpoints: ["frr4:eth2", "frr6:eth2"]

    - endpoints: ["frr5:eth3", "frr6:eth3"]
    - endpoints: ["frr5:eth1", "host3:eth1"]

    - endpoints: ["frr6:eth1", "host3:eth2"]

