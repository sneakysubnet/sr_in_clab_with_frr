frr version 10.5.4_git
frr defaults traditional
hostname frr3
!
interface eth1
 ip address 10.13.13.3/24
exit
!
interface eth2
 ip address 10.34.34.3/24
exit
!
interface lo
 ip address 3.3.3.3/32
exit
!
router ospf
 ospf router-id 3.3.3.3
 network 3.3.3.3/32 area 0
 network 10.13.13.0/24 area 0
 network 10.34.34.0/24 area 0
 capability opaque
 segment-routing on
 segment-routing global-block 16000 19999
 segment-routing node-msd 8
 segment-routing prefix 3.3.3.3/32 index 3
 router-info area
exit
!
end
