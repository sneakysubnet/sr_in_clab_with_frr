frr version 10.5.4_git
frr defaults traditional
hostname frr4
!
interface eth1
 ip address 10.46.46.4/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth2
 ip address 10.45.45.4/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.24.24.4/24
 ip router isis 1
 isis network point-to-point
exit
!
interface lo
 ip address 4.4.4.4/32
 ip router isis 1
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0004.00
exit
!
segment-routing
 traffic-eng
 exit
exit
!
end
