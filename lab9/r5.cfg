frr version 10.5.4_git
frr defaults traditional
hostname frr5
!
interface eth1
 ip address 10.56.56.5/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth2
 ip address 10.45.45.5/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.35.35.5/24
 ip router isis 1
 isis network point-to-point
exit
!
interface lo
 ip address 5.5.5.5/32
 ip router isis 1
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0005.00
exit
!
segment-routing
 traffic-eng
 exit
exit
!
end
