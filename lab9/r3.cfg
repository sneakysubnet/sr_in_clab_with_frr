frr version 10.5.4_git
frr defaults traditional
hostname frr3
!
interface eth1
 ip address 10.13.13.3/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth2
 ip address 10.23.23.3/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.35.35.3/24
 ip router isis 1
 isis network point-to-point
exit
!
interface lo
 ip address 3.3.3.3/32
 ip router isis 1
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0003.00
exit
!
segment-routing
 traffic-eng
 exit
exit
