frr version 10.5.4_git
frr defaults traditional
hostname frr1
!
interface eth1
 ip address 10.12.12.1/24
 ip router isis 1
exit
!
interface eth2
 ip address 10.13.13.1/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.100.100.1/24
exit
!
interface eth4
 ip address 10.101.101.1/24
exit
!
interface lo
 ip address 1.1.1.1/32
 ip router isis 1
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0001.00
exit
!
segment-routing
 traffic-eng
 exit
exit
!
end
