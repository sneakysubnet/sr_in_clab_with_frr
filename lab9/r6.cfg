frr version 10.5.4_git
frr defaults traditional
hostname frr6
!
interface eth1
 ip address 10.46.46.6/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth2
 ip address 10.56.56.6/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.200.200.1/24
exit
!
interface eth4
 ip address 10.201.201.1/24
exit
!
interface lo
 ip address 6.6.6.6/32
 ip router isis 1
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0006.00
exit
!
segment-routing
 traffic-eng
 exit
exit
!
end
