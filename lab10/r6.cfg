frr version 10.5.4_git
frr defaults traditional
hostname frr6
!
affinity-map red bit-position 1
affinity-map green bit-position 2
!
vrf vrfa
exit-vrf
!
vrf vrfb
exit-vrf
!
interface eth1
 ip address 10.46.46.6/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth2
 ip address 10.56.56.6/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.200.200.1/24
exit
!
interface eth4
 ip address 10.201.201.1/24
exit
!
interface lo
 ip address 6.6.6.6/32
 ip router isis 1
exit
!
router bgp 100
 neighbor 1.1.1.1 remote-as 100
 neighbor 1.1.1.1 update-source lo
 !
 address-family ipv4 vpn
  neighbor 1.1.1.1 activate
  neighbor 1.1.1.1 next-hop-self
 exit-address-family
exit
!
router bgp 100 vrf vrfa
 !
 address-family ipv4 unicast
  network 10.200.200.0/24
  label vpn export auto
  rd vpn export 6.6.6.6:1
  rt vpn export 1:1
  rt vpn import 1:1
  export vpn
  import vpn
 exit-address-family
exit
!
router bgp 100 vrf vrfb
 !
 address-family ipv4 unicast
  network 10.201.201.0/24
  label vpn export auto
  rd vpn export 6.6.6.6:2
  rt vpn export 2:2
  rt vpn import 2:2
  export vpn
  import vpn
 exit-address-family
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0006.00
 mpls-te on
 flex-algo 131
  dataplane sr-mpls
  affinity include-all green
 !
 flex-algo 132
  dataplane sr-mpls
  affinity include-all red
 !
 segment-routing on
 segment-routing global-block 16000 19999
 segment-routing node-msd 8
 segment-routing prefix 6.6.6.6/32 index 6
 segment-routing prefix 6.6.6.6/32 algorithm 131 index 106
 segment-routing prefix 6.6.6.6/32 algorithm 132 index 206
exit
!
segment-routing
 traffic-eng
 exit
exit
!
end
