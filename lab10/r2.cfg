frr version 10.5.4_git
frr defaults traditional
hostname frr2
!
affinity-map red bit-position 1
affinity-map green bit-position 2
!
interface eth1
 ip address 10.12.12.2/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth2
 ip address 10.23.23.2/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.24.24.2/24
 ip router isis 1
 isis network point-to-point
 link-params
  affinity green
 exit-link-params
exit
!
interface lo
 ip address 2.2.2.2/32
 ip router isis 1
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0002.00
 mpls-te on
 flex-algo 131
  dataplane sr-mpls
  affinity include-all green
 !
 flex-algo 132
  dataplane sr-mpls
  affinity include-all red
 !
 segment-routing on
 segment-routing global-block 16000 19999
 segment-routing node-msd 8
 segment-routing prefix 2.2.2.2/32 index 2
 segment-routing prefix 2.2.2.2/32 algorithm 131 index 102
 segment-routing prefix 2.2.2.2/32 algorithm 132 index 202
exit
!
segment-routing
 traffic-eng
 exit
exit
!
end
