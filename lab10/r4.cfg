frr version 10.5.4_git
frr defaults traditional
hostname frr4
!
affinity-map red bit-position 1
affinity-map green bit-position 2
!
interface eth1
 ip address 10.46.46.4/24
 ip router isis 1
 isis network point-to-point
 link-params
  affinity green
 exit-link-params
exit
!
interface eth2
 ip address 10.45.45.4/24
 ip router isis 1
 isis network point-to-point
exit
!
interface eth3
 ip address 10.24.24.4/24
 ip router isis 1
 isis network point-to-point
exit
!
interface lo
 ip address 4.4.4.4/32
 ip router isis 1
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0004.00
 mpls-te on
 flex-algo 131
  dataplane sr-mpls
!
 flex-algo 132
  dataplane sr-mpls
 !
 segment-routing on
 segment-routing global-block 16000 19999
 segment-routing node-msd 8
 segment-routing prefix 4.4.4.4/32 index 4
 segment-routing prefix 4.4.4.4/32 algorithm 131 index 104
 segment-routing prefix 4.4.4.4/32 algorithm 132 index 204
exit
!
segment-routing
 traffic-eng
 exit
exit
!
end
