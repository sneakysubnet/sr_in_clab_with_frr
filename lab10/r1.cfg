frr version 10.5.4_git
frr defaults traditional
hostname frr1
!
route-map FA permit 10
 match extcommunity algo131
 set sr-te color 131
exit
!
route-map FA permit 20
 match extcommunity algo132
 set sr-te color 132
exit
!
affinity-map red bit-position 1
affinity-map green bit-position 2
!
vrf vrfa
exit-vrf
!
vrf vrfb
exit-vrf
!
interface eth1
 ip address 10.12.12.1/24
 ip router isis 1
 isis network point-to-point
 link-params
  affinity green
 exit-link-params
exit
!
interface eth2
 ip address 10.13.13.1/24
 ip router isis 1
 isis network point-to-point
 link-params
  affinity red
 exit-link-params
exit
!
interface eth3
 ip address 10.100.100.1/24
exit
!
interface eth4
 ip address 10.101.101.1/24
exit
!
interface lo
 ip address 1.1.1.1/32
 ip router isis 1
exit
!
router bgp 100
 neighbor 6.6.6.6 remote-as 100
 neighbor 6.6.6.6 update-source lo
 !
 address-family ipv4 vpn
  neighbor 6.6.6.6 activate
  neighbor 6.6.6.6 next-hop-self
  neighbor 6.6.6.6 route-map FA in
 exit-address-family
exit
!
router bgp 100 vrf vrfa
 !
 address-family ipv4 unicast
  network 10.100.100.0/24
  label vpn export auto
  rd vpn export 1.1.1.1:1
  rt vpn export 1:1
  rt vpn import 1:1
  export vpn
  import vpn  
 exit-address-family
exit
!
router bgp 100 vrf vrfb
 !
 address-family ipv4 unicast
  network 10.101.101.0/24
  label vpn export auto
  rd vpn export 1.1.1.1:2
  rt vpn export 2:2
  rt vpn import 2:2
  export vpn
  import vpn 
 exit-address-family
exit
!
router isis 1
 is-type level-1
 net 49.0000.0000.0000.0001.00
 mpls-te on 
 flex-algo 131
  advertise-definition
  dataplane sr-mpls
  affinity include-all green
 !
 flex-algo 132
  advertise-definition
  dataplane sr-mpls
  affinity include-all red
 !
 segment-routing on
 segment-routing global-block 16000 19999
 segment-routing node-msd 8
 segment-routing prefix 1.1.1.1/32 index 1
 segment-routing prefix 1.1.1.1/32 algorithm 131 index 101
 segment-routing prefix 1.1.1.1/32 algorithm 132 index 201
exit
!
bgp community-list expanded algo131 seq 10 permit 1:1
bgp community-list expanded algo132 seq 10 permit 2:2
bgp extcommunity-list expanded algo131 seq 5 permit 1:1
bgp extcommunity-list expanded algo132 seq 5 permit 2:2
!
segment-routing
 traffic-eng
  segment-list algo131
   index 10 mpls label 16106
  exit
  segment-list algo132
   index 10 mpls label 16206
  exit
  policy color 131 endpoint 6.6.6.6
   candidate-path preference 10 name algo131 explicit segment-list algo131
  exit
  policy color 132 endpoint 6.6.6.6
   candidate-path preference 10 name algo132 explicit segment-list algo132
  exit
 exit
exit
!
end
